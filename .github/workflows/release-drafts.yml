name: Release Draft Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-drafts.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "debian/**"
      - "docs/release/**"
      - "packaging/**"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-drafts.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "debian/**"
      - "docs/release/**"
      - "packaging/**"
      - "scripts/**"

permissions:
  contents: read

jobs:
  windows-draft-artifacts:
    name: Windows draft artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build GUI artifact
        run: cargo build -p linkforge-gui --release

      - name: Build Windows shell extension
        run: cargo build -p linkforge-context-menu-windows --target x86_64-pc-windows-msvc --release

      - name: Prepare Windows context-menu sparse package
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File
          scripts/context-menu/windows/modern/Register-LinkForgeModernContextMenu.ps1
          -Configuration Release
          -PrepareOnly
          -StagingDir target/linkforge-modern-context-menu-ci

      - name: Validate release drafts
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/validate-release-drafts.ps1
          -RequireWindowsAppxManifest
          -WindowsAppxManifest target/linkforge-modern-context-menu-ci/AppxManifest.xml

      - name: Generate Windows draft checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path target/release-validation -Force | Out-Null
          $paths = @(
            "target/release/linkforge-gui.exe",
            "target/x86_64-pc-windows-msvc/release/linkforge_context_menu_windows.dll",
            "target/linkforge-modern-context-menu-ci/AppxManifest.xml"
          )
          Get-FileHash -Algorithm SHA256 -LiteralPath $paths |
            Format-Table -AutoSize |
            Out-String |
            Set-Content -LiteralPath target/release-validation/windows-checksums.txt -Encoding UTF8

      - name: Upload Windows validation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: windows-release-draft-validation
          path: |
            target/release-validation/
            target/linkforge-modern-context-menu-ci/

  linux-packaging-drafts:
    name: Linux packaging drafts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ubuntu packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            build-essential \
            cargo \
            debhelper \
            desktop-file-utils \
            devscripts \
            dpkg-dev \
            fakeroot \
            file \
            flatpak \
            flatpak-builder \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            lintian \
            patchelf \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare offline Cargo sources
        run: |
          mkdir -p .cargo
          cargo vendor --versioned-dirs vendor > .cargo/config.toml

      - name: Validate release drafts
        run: bash scripts/validate-release-drafts.sh

      - name: Build Debian binary packages
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc -b
          changes_file="$(find .. -maxdepth 1 -name 'linkforge_*_amd64.changes' -print -quit)"
          if [ -z "$changes_file" ]; then
            echo "::error title=Missing Debian changes file::Could not find binary amd64 .changes output."
            exit 1
          fi
          lintian --fail-on error "$changes_file"
          mkdir -p target/release-validation/linux-artifacts
          cp ../linkforge_*.deb ../linkforge_*.buildinfo "$changes_file" target/release-validation/linux-artifacts/

      - name: Build Flatpak bundle
        run: |
          mkdir -p target/release-validation/linux-artifacts
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.flatpak.Builder
          flatpak-builder --user --force-clean --install-deps-from=flathub --repo=repo build-dir packaging/flatpak/io.github.morningfrog.LinkForge.yml
          flatpak build-bundle repo target/release-validation/linux-artifacts/LinkForge.flatpak io.github.morningfrog.LinkForge
          set +e
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder manifest packaging/flatpak/io.github.morningfrog.LinkForge.yml > target/release-validation/flatpak-lint-manifest.log 2>&1
          manifest_lint_status=$?
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder repo repo > target/release-validation/flatpak-lint-repo.log 2>&1
          repo_lint_status=$?
          set -e
          if [ "$manifest_lint_status" -ne 0 ]; then
            echo "::warning title=Flatpak manifest linter::flatpak-builder-lint manifest exited $manifest_lint_status; see flatpak-lint-manifest.log."
          fi
          if [ "$repo_lint_status" -ne 0 ]; then
            echo "::warning title=Flatpak repo linter::flatpak-builder-lint repo exited $repo_lint_status; see flatpak-lint-repo.log."
          fi

      - name: Generate Linux draft checksums
        run: |
          mkdir -p target/release-validation
          sha256sum target/release-validation/linux-artifacts/* > target/release-validation/linux-checksums.txt

      - name: Upload Linux validation report and draft artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linux-release-draft-validation
          path: |
            target/release-validation/
